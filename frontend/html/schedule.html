<!DOCTYPE html>
<html>
<head>
    <title>StudentSiesta</title>
    <link rel="stylesheet" href="../css/sleep_tracker.css">

</head>
<body>
    <nav>
        <div class=title>
            <h1>StudentSiesta</h1>
        </div>
        <a href="homepage.html"><button class="tab">Home</button></a>
        <a href="log_sleep.html"><button class="tab" id="logTab">Log Sleep</button></a>
        <a href="schedule.html"><button class="tab active" id="scheduleTab">Schedule</button></a>
        <a href="insights.html"><button class="tab" id="insightsTab">Insights</button></a>
        <a href="login.html"><button class="tab">Login</button></a>
    </nav>

    <div class="schedule-container">
        <div class="schedule-tabs">
            <button class="tab active" data-target="calendarTab">View Calendar</button>
            <button class="tab" data-target="classesTab">Add Classes</button>
            <button class="tab" data-target="examsTab">Add Exams</button>
        </div>

        <div class="tab-content" id="calendarTab">
            <div class="calendar-container">
                <div class="calendar-header">
                    <button id="prevMonth">←</button>
                    <h3 id="monthYear"></h3>
                    <button id="nextMonth">→</button>
                </div>
                <table class="calendar-table">
                    <thead>
                        <tr>
                            <th>Sun</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th>
                        </tr>
                    </thead>
                    <tbody id="calendar-body">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="tab-content" id="classesTab">
            <div class="class-container">
                <div class="class-header">
                    <div>
                    <h3>Class Schedule 🗓️</h3></div>
                    <div class="add-classes-description">Add your weekly classes to track nights before early classes</div>
                </div>
                <form id="addClasses">
                    <!-- <h3>What date are you logging for?</h3>
                    <input type="date" id="sleepDate" required>

                    <h3>When did you go to bed?</h3>
                    <input type="time" id="bedtime" required>
                    
                    <h3>When did you wake up?</h3>
                    <input type="time" id="wakeTime" required>

                    <h3>How would you rate your sleep quality?</h3>
                    <input type="number" id="quality" min="1" max="5" required>
                    
                    <button type="submit">Log Sleep</button> -->
                </form>
            </div>
        </div>

        <div class="tab-content" id="examsTab">
        </div>
    </div>

    <script src="../js/schedule.js"></script>
</body>
</html>
